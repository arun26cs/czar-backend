spring:
  datasource:
    url: jdbc:h2:mem:czar_user_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS USERS
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        default_schema: USERS
  flyway:
    enabled: false
  mvc:
    problemdetails:
      enabled: true
  autoconfigure:
    exclude:
      - com.google.cloud.spring.autoconfigure.pubsub.GcpPubSubAutoConfiguration
      - com.google.cloud.spring.autoconfigure.core.GcpContextAutoConfiguration
# jwt.public-key-path intentionally omitted — SecurityConfig falls back to permitAll in tests
czar:
  internal:
    service-token: test-internal-token
