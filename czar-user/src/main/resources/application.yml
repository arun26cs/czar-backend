server:
  port: 8082

spring:
  application:
    name: czar-user
  datasource:
    url: ${DB_USER_URL:jdbc:postgresql://localhost:5432/czardb}
    username: ${DB_USER_USERNAME:czar_user_role}
    password: ${DB_USER_PASSWORD:czar_user_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: users
    open-in-view: false
  flyway:
    enabled: true
    schemas: users
    locations: classpath:db/migration/users
    baseline-on-migrate: true
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:czar-local}
      pubsub:
        emulator-host: ${PUBSUB_EMULATOR_HOST:}
  mvc:
    problemdetails:
      enabled: true

jwt:
  public-key-path: classpath:keys/public.pem

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

czar:
  internal:
    service-token: ${CZAR_INTERNAL_SERVICE_TOKEN:czar-internal-dev-token}

logging:
  level:
    com.czar: DEBUG
