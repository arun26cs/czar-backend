server:
  port: 8087

spring:
  application:
    name: czar-notification
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:czar-local}
      pubsub:
        emulator-host: ${PUBSUB_EMULATOR_HOST:}

# Firebase project for FCM push
firebase:
  enabled: ${FIREBASE_ENABLED:false}
  project-id: ${FIREBASE_PROJECT_ID:czar-local}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

# Service-to-service call to czar-user to fetch device tokens
czar:
  user:
    base-url: ${CZAR_USER_BASE_URL:http://localhost:8082}
  internal:
    service-token: ${CZAR_INTERNAL_SERVICE_TOKEN:czar-internal-dev-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.czar: DEBUG
