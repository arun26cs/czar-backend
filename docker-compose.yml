services:

  # ─── Infrastructure ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: czar-postgres
    environment:
      POSTGRES_DB: czardb
      POSTGRES_USER: czar_admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-czar_admin_local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U czar_admin -d czardb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - czar-network

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: czar-pubsub-emulator
    command: ["gcloud", "beta", "emulators", "pubsub", "start", "--host-port=0.0.0.0:8085", "--project=czar-local"]
    ports:
      - "9085:8085"   # host 9085 → container 8085 (avoids conflict with czar-voice-ai on host 8085)
    networks:
      - czar-network

  # ─── Application Services (start with: docker compose --profile apps up) ──
  czar-gateway:
    build:
      context: .
      dockerfile: czar-gateway/Dockerfile
    container_name: czar-gateway
    ports:
      - "8080:8080"
    environment:
      - GCP_PROJECT_ID=czar-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
    depends_on:
      - pubsub-emulator
    networks:
      - czar-network
    profiles:
      - apps

  czar-auth:
    build:
      context: .
      dockerfile: czar-auth/Dockerfile
    container_name: czar-auth
    ports:
      - "8081:8081"
    environment:
      - GCP_PROJECT_ID=czar-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - DB_AUTH_URL=jdbc:postgresql://postgres:5432/czardb
      - DB_AUTH_USERNAME=czar_auth_role
      - DB_AUTH_PASSWORD=${DB_AUTH_PASSWORD:-czar_auth_pass}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_ADDRESS=${SENDGRID_FROM_ADDRESS:-noreply@czar.app}
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-emulator:
        condition: service_started
    networks:
      - czar-network
    profiles:
      - apps

  czar-user:
    build:
      context: .
      dockerfile: czar-user/Dockerfile
    container_name: czar-user
    ports:
      - "8082:8082"
    environment:
      - GCP_PROJECT_ID=czar-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - DB_USER_URL=jdbc:postgresql://postgres:5432/czardb
      - DB_USER_USERNAME=czar_user_role
      - DB_USER_PASSWORD=${DB_USER_PASSWORD:-czar_user_pass}
      - CZAR_INTERNAL_SERVICE_TOKEN=${CZAR_INTERNAL_SERVICE_TOKEN:-czar-internal-dev-token}
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-emulator:
        condition: service_started
    networks:
      - czar-network
    profiles:
      - apps

  czar-planner:
    build:
      context: .
      dockerfile: czar-planner/Dockerfile
    container_name: czar-planner
    ports:
      - "8083:8083"
    environment:
      - GCP_PROJECT_ID=czar-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - DB_PLANNER_URL=jdbc:postgresql://postgres:5432/czardb
      - DB_PLANNER_USERNAME=czar_planner_role
      - DB_PLANNER_PASSWORD=${DB_PLANNER_PASSWORD:-czar_planner_pass}
      - CZAR_INTERNAL_SERVICE_TOKEN=${CZAR_INTERNAL_SERVICE_TOKEN:-czar-internal-dev-token}
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-emulator:
        condition: service_started
    networks:
      - czar-network
    profiles:
      - apps

  czar-notes:
    build:
      context: .
      dockerfile: czar-notes/Dockerfile
    container_name: czar-notes
    ports:
      - "8084:8084"
    environment:
      - GCP_PROJECT_ID=czar-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - DB_NOTES_URL=jdbc:postgresql://postgres:5432/czardb
      - DB_NOTES_USERNAME=czar_user_role
      - DB_NOTES_PASSWORD=${DB_USER_PASSWORD:-czar_user_pass}
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-emulator:
        condition: service_started
    networks:
      - czar-network
    profiles:
      - apps

  czar-voice-ai:
    build:
      context: .
      dockerfile: czar-voice-ai/Dockerfile
    container_name: czar-voice-ai
    ports:
      - "8085:8085"
    environment:
      - GCP_PROJECT_ID=czar-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - pubsub-emulator
    networks:
      - czar-network
    profiles:
      - apps

  czar-conflict:
    build:
      context: .
      dockerfile: czar-conflict/Dockerfile
    container_name: czar-conflict
    ports:
      - "8086:8086"
    environment:
      - GCP_PROJECT_ID=czar-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - CZAR_PLANNER_BASE_URL=${CZAR_PLANNER_BASE_URL:-http://czar-planner:8083}
      - CZAR_INTERNAL_SERVICE_TOKEN=${CZAR_INTERNAL_SERVICE_TOKEN:-czar-internal-dev-token}
    depends_on:
      - pubsub-emulator
    networks:
      - czar-network
    profiles:
      - apps

  czar-notification:
    build:
      context: .
      dockerfile: czar-notification/Dockerfile
    container_name: czar-notification
    ports:
      - "8087:8087"
    environment:
      - GCP_PROJECT_ID=czar-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - CZAR_USER_BASE_URL=${CZAR_USER_BASE_URL:-http://czar-user:8082}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-czar-local}
      - CZAR_INTERNAL_SERVICE_TOKEN=${CZAR_INTERNAL_SERVICE_TOKEN:-czar-internal-dev-token}
    depends_on:
      - pubsub-emulator
    networks:
      - czar-network
    profiles:
      - apps

volumes:
  postgres_data:

networks:
  czar-network:
    driver: bridge
